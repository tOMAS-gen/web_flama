name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_PHONE_DISPLAY=${{ vars.NEXT_PUBLIC_PHONE_DISPLAY }}
            NEXT_PUBLIC_PHONE_INTERNATIONAL=${{ vars.NEXT_PUBLIC_PHONE_INTERNATIONAL }}
            NEXT_PUBLIC_WHATSAPP_ID=${{ vars.NEXT_PUBLIC_WHATSAPP_ID }}
            NEXT_PUBLIC_ADDRESS=${{ vars.NEXT_PUBLIC_ADDRESS }}
            NEXT_PUBLIC_INSTAGRAM=${{ vars.NEXT_PUBLIC_INSTAGRAM }}
            NEXT_PUBLIC_MAPS_URL=${{ vars.NEXT_PUBLIC_MAPS_URL }}
            NEXT_PUBLIC_HOURS=${{ vars.NEXT_PUBLIC_HOURS }}
