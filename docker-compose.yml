services:
  web:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://flamastudio.ar}
        - NEXT_PUBLIC_PHONE_DISPLAY=${NEXT_PUBLIC_PHONE_DISPLAY:-0263 15-473-9193}
        - NEXT_PUBLIC_PHONE_INTERNATIONAL=${NEXT_PUBLIC_PHONE_INTERNATIONAL:-+549263154739193}
        - NEXT_PUBLIC_WHATSAPP_ID=${NEXT_PUBLIC_WHATSAPP_ID:-549263154739193}
        - NEXT_PUBLIC_ADDRESS=${NEXT_PUBLIC_ADDRESS:-Ladislao Segura 190, M5573 Junín, Mendoza}
        - NEXT_PUBLIC_INSTAGRAM=${NEXT_PUBLIC_INSTAGRAM:-flamastudio.ar}
        - NEXT_PUBLIC_MAPS_URL=${NEXT_PUBLIC_MAPS_URL:-https://maps.app.goo.gl/tDXcngSKQLuvmzuZ7}
        - NEXT_PUBLIC_HOURS=${NEXT_PUBLIC_HOURS:-Lun a Vie, 9:30–17:30}
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
